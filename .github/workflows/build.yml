86name: Build RedSun Multi-Arch
on:
  push:
  workflow_dispatch:

permissions:
  contents: write # Required to allow the action to push files back to your repo

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Compile RedSun
        # Added Advapi32.lib, User32.lib, and Ole32.lib to resolve LNK2019 errors.
        # Changed /out: to /Fe: for correct executable naming.
        run: cl.exe /EHsc /std:c++17 /D UNICODE /D _UNICODE RedSun.cpp Advapi32.lib User32.lib Ole32.lib /Fe:RedSun_${{ matrix.arch }}.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RedSun-Binaries-${{ matrix.arch }}
          path: RedSun_${{ matrix.arch }}.exe

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries-temp
          merge-multiple: true

      - name: Move to binaries folder
        run: |
          mkdir -p binaries
          mv binaries-temp/*.exe binaries/
          rm -rf binaries-temp

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Build: update binaries [skip ci]"
          file_pattern: 'binaries/*.exe'
          branch: main